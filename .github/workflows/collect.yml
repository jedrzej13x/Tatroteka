name: Tatry Flow — Daily Segment Collection

on:
  schedule:
    - cron: '0 5 * * *'   # codziennie o 5:00 UTC (7:00 czasu polskiego)
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/collect.yml'

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv folium shapely

      # Baza danych jest w repo — checkout już ją pobrał
      - name: Check database
        run: |
          if [ -f tatry_segments.db ]; then
            echo "Baza istnieje: $(du -sh tatry_segments.db)"
          else
            echo "Brak bazy — pierwsze uruchomienie, zostanie utworzona"
          fi

      - name: Run collector
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          DB_PATH:              tatry_segments.db
        run: python "Strava API fetcher.py"

      - name: Show report
        env:
          DB_PATH: tatry_segments.db
        run: python "Strava API fetcher.py" --report

      - name: Export traffic JSON
        env:
          DB_PATH: tatry_segments.db
        run: python "Strava API fetcher.py" --export

      - name: Collect IMGW weather
        env:
          DB_PATH: tatry_segments.db
        run: python "imgw fetcher.py"

      - name: Regenerate map (index.html)
        run: python Tatroteka.py

      - name: Commit all changes to repo
        run: |
          git config user.name  "Tatry Flow Bot"
          git config user.email "bot@tatroteka.pl"
          git add -f tatry_segments.db traffic_data.json weather_data.json index.html
          git diff --cached --quiet || git commit -m "data: snapshot $(date +'%Y-%m-%d')"
          git push